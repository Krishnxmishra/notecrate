<!DOCTYPE html>
<html>
<head><title>Generate NoteCrate Icons</title></head>
<body>
  <p>Open this file from the <code>extension/icons/</code> folder. Right-click each canvas and "Save image as" to save the icons, or click the download links.</p>
  <div id="icons"></div>
  <script>
    const sizes = [16, 32, 48, 128];
    const container = document.getElementById("icons");

    const img = new Image();
    img.src = "../../image (3).png";
    img.onload = () => {
      sizes.forEach((size) => {
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, size, size);

        const label = document.createElement("div");
        label.style.margin = "12px 0";
        label.innerHTML = `<strong>icon${size}.png</strong><br>`;
        label.appendChild(canvas);
        container.appendChild(label);

        const link = document.createElement("a");
        link.download = `icon${size}.png`;
        link.href = canvas.toDataURL();
        link.textContent = ` [Download icon${size}.png]`;
        label.appendChild(link);
      });
    };
    img.onerror = () => {
      document.body.innerHTML += "<p style='color:red'>Could not load logo image. Make sure image (2).png exists two directories up.</p>";
    };
  </script>
</body>
</html>
